spring:
  datasource:
    url: jdbc:h2:mem:health;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

app:
  ai:
    mode: mock
  analysis:
    cleanup-batch-size: 2
  video:
    temp-dir: ${java.io.tmpdir}/health-test-videos
    allowed-content-types:
      - video/mp4
      - video/quicktime
    allowed-extensions:
      - .mp4
      - .mov
