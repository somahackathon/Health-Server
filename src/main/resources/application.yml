spring:
  application:
    name: health
  jackson:
    default-property-inclusion: always
    deserialization:
      FAIL_ON_UNKNOWN_PROPERTIES: true
  datasource:
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER_CLASS_NAME:org.mariadb.jdbc.Driver}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true

springdoc:
  api-docs:
    enabled: ${OPENAPI_ENABLED:false}
  swagger-ui:
    enabled: ${OPENAPI_ENABLED:false}

app:
  time:
    storage-zone: UTC
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8081}
  ai:
    mode: ${AI_MODE:real}
    fitness-mode: ${AI_FITNESS_MODE:${AI_MODE:real}}
    posture-mode: ${AI_POSTURE_MODE:${AI_MODE:real}}
    base-url: ${AI_BASE_URL:}
    api-key: ${AI_API_KEY:}
    connect-timeout: ${AI_CONNECT_TIMEOUT:3s}
    read-timeout: ${AI_READ_TIMEOUT:10s}
    fitness-path: ${AI_FITNESS_PATH:/fitness/analyze}
    posture-path: ${AI_POSTURE_PATH:/posture/analyze}
    retry-count: ${AI_RETRY_COUNT:0}
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-3.5-flash-lite}
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
      connect-timeout: ${GEMINI_CONNECT_TIMEOUT:5s}
      read-timeout: ${GEMINI_READ_TIMEOUT:90s}
  analysis:
    cleanup-batch-size: ${ANALYSIS_CLEANUP_BATCH_SIZE:100}
  video:
    allowed-content-types: ${VIDEO_ALLOWED_CONTENT_TYPES:video/mp4,video/quicktime}
    allowed-extensions: ${VIDEO_ALLOWED_EXTENSIONS:.mp4,.mov}
